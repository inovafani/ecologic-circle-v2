    <rect x="0" y="18" width="90" height="14" rx="4" fill="#e7d9b3" stroke="#cdbb8c" stroke-width="2"/>
    <rect x="6" y="6" width="90" height="14" rx="4" fill="#efe3c4" stroke="#cdbb8c" stroke-width="2"/>
    <rect x="12" y="-6" width="90" height="14" rx="4" fill="#f5ecd3" stroke="#cdbb8c" stroke-width="2"/>
