<svg xmlns="http://www.w3.org/2000/svg" width="520" height="390" viewBox="0 0 520 390" fill="none" role="img" aria-label="Biochar">
  <defs>
    <radialGradient id="charPile" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#3a3f39"/>
      <stop offset="1" stop-color="#14160f"/>
    </radialGradient>
  </defs>
  <!-- pile mound -->
  <path d="M70 300 q190 -150 380 0 q-190 70 -380 0 z" fill="url(#charPile)"/>
  <ellipse cx="260" cy="300" rx="190" ry="34" fill="#0e0f0a"/>
  <!-- granules -->
  <g>
    <g fill="#22251d" stroke="#454b3e" stroke-width="0.8">
      <path d="M150 268 l16 -10 12 12 -10 14 -16 -4z"/>
      <path d="M210 240 l18 -8 10 14 -12 12 -16 -6z"/>
      <path d="M278 232 l16 -12 14 10 -8 16 -18 -2z"/>
      <path d="M340 250 l18 -10 12 14 -12 12 -16 -6z"/>
      <path d="M250 276 l16 -10 14 12 -10 14 -18 -4z"/>
      <path d="M320 286 l16 -8 10 12 -12 12 -14 -6z"/>
      <path d="M180 290 l14 -8 12 10 -10 12 -14 -4z"/>
    </g>
    <!-- highlights -->
    <g fill="#6b7360" opacity="0.7">
      <circle cx="232" cy="246" r="2"/>
      <circle cx="292" cy="240" r="2.2"/>
      <circle cx="352" cy="256" r="1.8"/>
      <circle cx="200" cy="272" r="1.6"/>
      <circle cx="300" cy="284" r="1.8"/>
    </g>
  </g>
  <!-- a couple of green sprouts: carbon returning to life -->
  <g stroke="#5aa84b" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M260 232 q-2 -34 -18 -48"/>
    <path d="M260 232 q4 -26 22 -34"/>
  </g>
  <path d="M242 184 q-16 -2 -22 -14 q14 -2 22 14z" fill="#7bbf54"/>
  <path d="M282 198 q14 -6 22 -2 q-8 12 -22 2z" fill="#9fd95a"/>
